<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポモドーロタイマー</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="app-bg">
    <div class="card">
      <!-- タイトルバー -->
      <div class="title-bar">
        <span class="title-text">ポモドーロタイマー</span>
        <div class="window-controls">
          <span>&#8722;</span>
          <span>&#9633;</span>
          <span>&#10005;</span>
        </div>
      </div>

      <!-- フェーズラベル -->
      <p class="phase-label" id="phase-label">作業中</p>

      <!-- 円形プログレスバー -->
      <div class="timer-ring-wrapper">
        <svg class="timer-ring" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <!-- 背景トラック -->
          <circle
            class="ring-track"
            cx="100" cy="100" r="80"
            fill="none"
            stroke-width="14"
          />
          <!-- 進捗リング -->
          <circle
            class="ring-progress"
            id="ring-progress"
            cx="100" cy="100" r="80"
            fill="none"
            stroke-width="14"
            stroke-linecap="round"
            transform="rotate(-90 100 100)"
          />
        </svg>
        <!-- タイマー表示 -->
        <div class="timer-display" id="timer-display">25:00</div>
      </div>

      <!-- ボタン -->
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-start">開始</button>
        <button class="btn btn-outline" id="btn-reset">リセット</button>
      </div>

      <!-- 今日の進捗 -->
      <div class="progress-section">
        <p class="progress-title">今日の進捗</p>
        <div class="progress-stats">
          <div class="stat">
            <span class="stat-value" id="stat-completed">0</span>
            <span class="stat-label">完了</span>
          </div>
          <div class="stat">
            <span class="stat-value stat-accent" id="stat-minutes">0分</span>
            <span class="stat-label">集中時間</span>
          </div>
          <div class="stat">
            <span class="stat-value streak-value" id="stat-streak">0</span>
            <span class="stat-label">🔥 連続日数</span>
          </div>
        </div>
      </div>

      <!-- レベル・XP セクション -->
      <div class="gamification-section">
        <div class="level-row">
          <span class="level-badge" id="level-badge">Lv.1</span>
          <div class="xp-bar-wrapper">
            <div class="xp-bar-track">
              <div class="xp-bar-fill" id="xp-bar-fill" style="width: 0%"></div>
            </div>
            <span class="xp-label" id="xp-label">0 / 500 XP</span>
          </div>
        </div>
      </div>

      <!-- バッジセクション -->
      <div class="badges-section" id="badges-section">
        <p class="badges-title">獲得バッジ</p>
        <div class="badges-list" id="badges-list">
          <span class="badge-empty">まだバッジがありません</span>
        </div>
      </div>

      <!-- 統計トグルボタン -->
      <div class="stats-toggle-row">
        <button class="btn btn-stats-toggle" id="btn-stats-toggle">📊 統計を見る</button>
      </div>

      <!-- 統計パネル（トグル表示） -->
      <div class="stats-panel" id="stats-panel" style="display:none">
        <div class="stats-tabs">
          <button class="stats-tab active" id="tab-weekly" data-tab="weekly">週間</button>
          <button class="stats-tab" id="tab-monthly" data-tab="monthly">月間</button>
        </div>
        <div class="stats-chart-area" id="stats-chart-area">
          <div class="chart-loading">読み込み中…</div>
        </div>
        <div class="stats-summary" id="stats-summary"></div>
      </div>
    </div>
  </div>

  <script src="/static/js/renderer.js"></script>
  <script src="/static/js/timer.js"></script>
  <script src="/static/js/api.js"></script>
  <script>
    // ---- 初期化 ----
    const api = new ApiClient();
    const renderer = new CircleRenderer('ring-progress', 'timer-display', 'phase-label');

    const statCompleted = document.getElementById('stat-completed');
    const statMinutes   = document.getElementById('stat-minutes');
    const statStreak    = document.getElementById('stat-streak');
    const levelBadge    = document.getElementById('level-badge');
    const xpBarFill     = document.getElementById('xp-bar-fill');
    const xpLabel       = document.getElementById('xp-label');
    const badgesList    = document.getElementById('badges-list');

    /** total_minutes を「X時間Y分」または「Y分」形式に変換 */
    function formatMinutes(total) {
      const h = Math.floor(total / 60);
      const m = total % 60;
      if (h > 0 && m > 0) return `${h}時間${m}分`;
      if (h > 0)          return `${h}時間`;
      return `${m}分`;
    }

    /** 今日の進捗を API から取得して表示する */
    async function refreshStats() {
      try {
        const stats = await api.getTodayStats();
        statCompleted.textContent = stats.completed;
        statMinutes.textContent   = formatMinutes(stats.total_minutes);
      } catch (e) {
        console.error('進捗取得エラー:', e);
      }
    }

    /** ゲーミフィケーション情報を API から取得して表示する */
    async function refreshGamification() {
      try {
        const g = await api.getGamification();
        statStreak.textContent = g.streak;
        levelBadge.textContent = `Lv.${g.level}`;
        const pct = g.xp_per_level > 0
          ? Math.round((g.xp_in_level / g.xp_per_level) * 100)
          : 0;
        xpBarFill.style.width = `${pct}%`;
        xpLabel.textContent = `${g.xp_in_level} / ${g.xp_per_level} XP`;

        if (g.badges && g.badges.length > 0) {
          badgesList.innerHTML = g.badges.map(b =>
            `<span class="badge-item" title="${b.description}">${b.name}</span>`
          ).join('');
        } else {
          badgesList.innerHTML = '<span class="badge-empty">まだバッジがありません</span>';
        }
      } catch (e) {
        console.error('ゲーミフィケーション取得エラー:', e);
      }
    }

    const timer = new PomodoroTimer({
      onTick(secondsLeft, totalSeconds) {
        renderer.update(secondsLeft, totalSeconds);
      },
      onPhaseChange(phase) {
        renderer.setPhaseLabel(phase);
        // フェーズ切り替え時にボタンを「開始」に戻す
        btnStart.textContent = '開始';
      },
      async onComplete(durationMinutes) {
        try {
          await api.postSession(durationMinutes);
        } catch (e) {
          console.error('セッション保存エラー:', e);
        }
        await refreshStats();
        await refreshGamification();
      },
    });

    // 初期表示
    renderer.update(timer.secondsLeft, timer.totalSeconds);
    renderer.setPhaseLabel(timer.phase);

    // ページ読み込み時に今日の進捗・ゲーミフィケーション情報を表示
    refreshStats();
    refreshGamification();

    // ---- ボタン操作 ----
    const btnStart = document.getElementById('btn-start');
    const btnReset = document.getElementById('btn-reset');

    btnStart.addEventListener('click', () => {
      if (timer.isRunning) {
        timer.pause();
        btnStart.textContent = '再開';
      } else {
        timer.start();
        btnStart.textContent = '一時停止';
      }
    });

    btnReset.addEventListener('click', () => {
      timer.reset();
      btnStart.textContent = '開始';
    });

    // ---- 統計パネル ----
    const btnStatsToggle = document.getElementById('btn-stats-toggle');
    const statsPanel     = document.getElementById('stats-panel');
    const chartArea      = document.getElementById('stats-chart-area');
    const statsSummary   = document.getElementById('stats-summary');
    let statsVisible     = false;
    let activeTab        = 'weekly';

    function renderBarChart(days) {
      const maxCompleted = Math.max(...days.map(d => d.completed), 1);
      return days.map(d => {
        const pct = Math.round((d.completed / maxCompleted) * 100);
        const label = d.date.substring(5, 10); // MM-DD
        return `
          <div class="chart-bar-col">
            <div class="chart-bar-wrap">
              <div class="chart-bar" style="height:${pct}%" title="${d.completed}回"></div>
            </div>
            <span class="chart-bar-label">${label}</span>
          </div>`;
      }).join('');
    }

    async function loadStats(tab) {
      chartArea.innerHTML = '<div class="chart-loading">読み込み中…</div>';
      statsSummary.innerHTML = '';
      try {
        const data = tab === 'weekly'
          ? await api.getWeeklyStats()
          : await api.getMonthlyStats();

        chartArea.innerHTML = `<div class="chart-bars">${renderBarChart(data.days)}</div>`;
        statsSummary.innerHTML =
          `<span>合計 <strong>${data.total_completed}</strong> 回完了 ／ ` +
          `<strong>${formatMinutes(data.total_minutes)}</strong> 集中</span>`;
      } catch (e) {
        chartArea.innerHTML = '<div class="chart-loading">取得に失敗しました</div>';
        console.error('統計取得エラー:', e);
      }
    }

    btnStatsToggle.addEventListener('click', () => {
      statsVisible = !statsVisible;
      statsPanel.style.display = statsVisible ? 'block' : 'none';
      btnStatsToggle.textContent = statsVisible ? '📊 統計を閉じる' : '📊 統計を見る';
      if (statsVisible) loadStats(activeTab);
    });

    document.querySelectorAll('.stats-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.stats-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeTab = tab.dataset.tab;
        if (statsVisible) loadStats(activeTab);
      });
    });
  </script>
</body>
</html>
