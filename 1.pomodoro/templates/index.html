<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポモドーロタイマー</title>
  <!-- テーマのちらつき防止：ページ描画前にテーマを適用 -->
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem('pomodoroSettings'));
        if (s && s.theme) document.documentElement.setAttribute('data-theme', s.theme);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="app-bg">
    <div class="card">
      <!-- タイトルバー -->
      <div class="title-bar">
        <span class="title-text">ポモドーロタイマー</span>
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="btn-settings" id="btn-settings" title="設定">&#9881;</button>
          <div class="window-controls">
            <span>&#8722;</span>
            <span>&#9633;</span>
            <span>&#10005;</span>
          </div>
        </div>
      </div>

      <!-- フェーズラベル -->
      <p class="phase-label" id="phase-label">作業中</p>

      <!-- 円形プログレスバー -->
      <div class="timer-ring-wrapper">
        <svg class="timer-ring" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <!-- 背景トラック -->
          <circle
            class="ring-track"
            cx="100" cy="100" r="80"
            fill="none"
            stroke-width="14"
          />
          <!-- 進捗リング -->
          <circle
            class="ring-progress"
            id="ring-progress"
            cx="100" cy="100" r="80"
            fill="none"
            stroke-width="14"
            stroke-linecap="round"
            transform="rotate(-90 100 100)"
          />
        </svg>
        <!-- タイマー表示 -->
        <div class="timer-display" id="timer-display">25:00</div>
      </div>

      <!-- ボタン -->
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-start">開始</button>
        <button class="btn btn-outline" id="btn-reset">リセット</button>
      </div>

      <!-- 今日の進捗 -->
      <div class="progress-section">
        <p class="progress-title">今日の進捗</p>
        <div class="progress-stats">
          <div class="stat">
            <span class="stat-value" id="stat-completed">0</span>
            <span class="stat-label">完了</span>
          </div>
          <div class="stat">
            <span class="stat-value stat-accent" id="stat-minutes">0分</span>
            <span class="stat-label">集中時間</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 設定モーダル -->
  <div class="settings-overlay" id="settings-overlay" hidden>
    <div class="settings-modal" role="dialog" aria-modal="true" aria-label="設定">
      <div class="settings-header">
        <span class="settings-title">設定</span>
        <button class="settings-close" id="settings-close" aria-label="閉じる">&#10005;</button>
      </div>

      <!-- 作業時間 -->
      <div class="settings-group">
        <span class="settings-group-label">作業時間</span>
        <div class="option-group" id="work-time-group">
          <button class="option-btn" data-value="15">15分</button>
          <button class="option-btn" data-value="25">25分</button>
          <button class="option-btn" data-value="35">35分</button>
          <button class="option-btn" data-value="45">45分</button>
        </div>
      </div>

      <!-- 休憩時間 -->
      <div class="settings-group">
        <span class="settings-group-label">休憩時間</span>
        <div class="option-group" id="break-time-group">
          <button class="option-btn" data-value="5">5分</button>
          <button class="option-btn" data-value="10">10分</button>
          <button class="option-btn" data-value="15">15分</button>
        </div>
      </div>

      <!-- テーマ -->
      <div class="settings-group">
        <span class="settings-group-label">テーマ</span>
        <div class="option-group" id="theme-group">
          <button class="option-btn" data-value="light">ライト</button>
          <button class="option-btn" data-value="dark">ダーク</button>
          <button class="option-btn" data-value="focus">フォーカス</button>
        </div>
      </div>

      <!-- サウンド -->
      <div class="settings-group">
        <span class="settings-group-label">サウンド</span>
        <div class="sound-toggles">
          <label class="toggle-row">
            <span>開始音</span>
            <span class="toggle-switch">
              <input type="checkbox" id="sound-start">
              <span class="toggle-track"></span>
            </span>
          </label>
          <label class="toggle-row">
            <span>終了音</span>
            <span class="toggle-switch">
              <input type="checkbox" id="sound-end">
              <span class="toggle-track"></span>
            </span>
          </label>
          <label class="toggle-row">
            <span>Tick音</span>
            <span class="toggle-switch">
              <input type="checkbox" id="sound-tick">
              <span class="toggle-track"></span>
            </span>
          </label>
        </div>
      </div>

      <!-- 適用ボタン -->
      <button class="btn btn-primary settings-apply" id="settings-apply">適用</button>
    </div>
  </div>

  <script src="/static/js/settings.js"></script>
  <script src="/static/js/renderer.js"></script>
  <script src="/static/js/timer.js"></script>
  <script src="/static/js/api.js"></script>
  <script>
    // ---- 設定の初期化 ----
    const settings = new Settings();
    settings.applyTheme();

    // ---- タイマー・レンダラーの初期化 ----
    const api = new ApiClient();
    const renderer = new CircleRenderer('ring-progress', 'timer-display', 'phase-label');

    const statCompleted = document.getElementById('stat-completed');
    const statMinutes   = document.getElementById('stat-minutes');

    /** total_minutes を「X時間Y分」または「Y分」形式に変換 */
    function formatMinutes(total) {
      const h = Math.floor(total / 60);
      const m = total % 60;
      if (h > 0 && m > 0) return `${h}時間${m}分`;
      if (h > 0)          return `${h}時間`;
      return `${m}分`;
    }

    /** 今日の進捗を API から取得して表示する */
    async function refreshStats() {
      try {
        const stats = await api.getTodayStats();
        statCompleted.textContent = stats.completed;
        statMinutes.textContent   = formatMinutes(stats.total_minutes);
      } catch (e) {
        console.error('進捗取得エラー:', e);
      }
    }

    const timer = new PomodoroTimer({
      workMinutes:       settings.workMinutes,
      shortBreakMinutes: settings.shortBreakMinutes,
      onTick(secondsLeft, totalSeconds) {
        renderer.update(secondsLeft, totalSeconds);
        settings.playSound('tick');
      },
      onPhaseChange(phase) {
        renderer.setPhaseLabel(phase);
        btnStart.textContent = '開始';
        settings.playSound('end');
      },
      async onComplete(durationMinutes) {
        try {
          await api.postSession(durationMinutes);
        } catch (e) {
          console.error('セッション保存エラー:', e);
        }
        await refreshStats();
      },
    });

    // 初期表示
    renderer.update(timer.secondsLeft, timer.totalSeconds);
    renderer.setPhaseLabel(timer.phase);

    // ページ読み込み時に今日の進捗を表示
    refreshStats();

    // ---- ボタン操作 ----
    const btnStart = document.getElementById('btn-start');
    const btnReset = document.getElementById('btn-reset');

    btnStart.addEventListener('click', () => {
      if (timer.isRunning) {
        timer.pause();
        btnStart.textContent = '再開';
      } else {
        timer.start();
        btnStart.textContent = '一時停止';
        settings.playSound('start');
      }
    });

    btnReset.addEventListener('click', () => {
      timer.reset();
      btnStart.textContent = '開始';
    });

    // ---- 設定パネル ----
    const overlay       = document.getElementById('settings-overlay');
    const btnSettings   = document.getElementById('btn-settings');
    const btnClose      = document.getElementById('settings-close');
    const btnApply      = document.getElementById('settings-apply');

    const workGroup     = document.getElementById('work-time-group');
    const breakGroup    = document.getElementById('break-time-group');
    const themeGroup    = document.getElementById('theme-group');
    const chkSoundStart = document.getElementById('sound-start');
    const chkSoundEnd   = document.getElementById('sound-end');
    const chkSoundTick  = document.getElementById('sound-tick');

    /** オプションボタン群の active クラスを更新する */
    function setActive(group, value) {
      group.querySelectorAll('.option-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.value === String(value));
      });
    }

    /** 現在の設定値をパネルの UI に反映する */
    function syncPanelToSettings() {
      setActive(workGroup,  settings.workMinutes);
      setActive(breakGroup, settings.shortBreakMinutes);
      setActive(themeGroup, settings.theme);
      chkSoundStart.checked = settings.soundStart;
      chkSoundEnd.checked   = settings.soundEnd;
      chkSoundTick.checked  = settings.soundTick;
    }

    /** オプションボタン群のクリックハンドラを登録する */
    function bindOptionGroup(group) {
      group.addEventListener('click', e => {
        const btn = e.target.closest('.option-btn');
        if (!btn) return;
        setActive(group, btn.dataset.value);
      });
    }

    bindOptionGroup(workGroup);
    bindOptionGroup(breakGroup);
    bindOptionGroup(themeGroup);

    /** 設定パネルを開く */
    btnSettings.addEventListener('click', () => {
      syncPanelToSettings();
      overlay.hidden = false;
    });

    /** 設定パネルを閉じる */
    function closeSettings() {
      overlay.hidden = true;
    }

    btnClose.addEventListener('click', closeSettings);

    // オーバーレイ背景クリックで閉じる
    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeSettings();
    });

    // Esc キーで閉じる
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && !overlay.hidden) closeSettings();
    });

    /** 設定を保存してタイマーに反映する */
    btnApply.addEventListener('click', () => {
      const workMin  = parseInt(workGroup.querySelector('.option-btn.active')?.dataset.value  ?? settings.workMinutes, 10);
      const breakMin = parseInt(breakGroup.querySelector('.option-btn.active')?.dataset.value ?? settings.shortBreakMinutes, 10);
      const theme    = themeGroup.querySelector('.option-btn.active')?.dataset.value ?? settings.theme;

      settings.save({
        workMinutes:       workMin,
        shortBreakMinutes: breakMin,
        theme,
        soundStart: chkSoundStart.checked,
        soundEnd:   chkSoundEnd.checked,
        soundTick:  chkSoundTick.checked,
      });

      settings.applyTheme();
      timer.configure(workMin, breakMin);
      btnStart.textContent = '開始';
      closeSettings();
    });
  </script>
</body>
</html>
